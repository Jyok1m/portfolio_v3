						"@type": "Question",
						"name": "Quel est votre TJM ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Mon TJM se situe en général entre 450 et 650 € par jour, selon la complexité de la mission, sa durée et son urgence. Le tarif exact se cale au moment du cadrage."
						}
					},
					{
						"@type": "Question",
						"name": "À quel budget s'attendre pour un projet web ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "À titre indicatif, les projets vont d'environ 3 000 € pour une offre simple à 40 000 €+ pour une architecture Cloud plus complète. Une formule intermédiaire pour PME et startups se situe souvent entre 8 000 et 15 000 €. Ces fourchettes restent à affiner avec le cadrage."
						}
					},
					{
						"@type": "Question",
						"name": "Sur quels domaines techniques intervenez-vous ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Principalement sur quatre domaines : Cloud & DevOps (AWS, Terraform, Kubernetes, Docker, CI/CD), développement Fullstack (React, Next.js, Node.js, TypeScript), ingénierie IA (LangChain, OpenAI, RAG, ChromaDB) et formation en bootcamp."
						}
					},
					{
						"@type": "Question",
						"name": "Travaillez-vous à distance ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Oui, principalement en remote depuis Paris, avec des déplacements ponctuels possibles pour les phases de cadrage ou les ateliers."
						}
					},
					{
						"@type": "Question",
						"name": "Proposez-vous aussi des audits et migrations cloud ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Oui, à titre indicatif : audits sécurité (OWASP) de 1 500 à 3 000 €, audits fonctionnels/techniques de 1 000 à 2 500 €, migrations cloud (AWS/GCP/Azure) de 5 000 à 20 000 €, conteneurisation d'applications existantes de 1 500 à 4 000 €."
						}
					},
					{
						"@type": "Question",
						"name": "Sous quel délai pour un devis ?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Je reviens en général avec un devis sous 48 h après un premier échange de cadrage. Hébergement, nom de domaine et infrastructure sont inclus dans les formules indiquées."
						}
					}
				]
			}
